name: Build and Push Images
on:
  push:
    branches: [main]
    paths: ['app/**']

permissions:
  id-token: write
  contents: write

jobs:
  build:
    strategy:
      matrix:
        service: [frontend, backend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/github-actions-deploy
          aws-region: eu-west-1

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build image
        run: |
          docker buildx build --platform linux/amd64 \
            -t ${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.eu-west-1.amazonaws.com/workshop-${{ matrix.service }}:${{ github.sha }} \
            --load \
            app/${{ matrix.service }}

      - name: Trivy scan (report-only)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.eu-west-1.amazonaws.com/workshop-${{ matrix.service }}:${{ github.sha }}
          format: table
          severity: CRITICAL,HIGH
          exit-code: 0                    # change to 1 to enforce; reports only for now
          ignore-unfixed: true

      - name: Push image
        run: docker push ${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.eu-west-1.amazonaws.com/workshop-${{ matrix.service }}:${{ github.sha }}

      - name: Update manifest tag (retry on race)
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          for i in 1 2 3 4 5; do
            git pull --rebase origin main
            sed -i "s|workshop-${{ matrix.service }}:.*|workshop-${{ matrix.service }}:${{ github.sha }}|" \
              k8s_manifests/${{ matrix.service }}-deployment.yaml
            git add k8s_manifests/${{ matrix.service }}-deployment.yaml
            git diff --cached --quiet && { echo "no changes"; exit 0; }
            git commit -m "ci: bump ${{ matrix.service }} to ${{ github.sha }}"
            git push && exit 0
            echo "push race, retrying ($i/5)"
            sleep $((RANDOM % 5 + 1))
            git reset --hard origin/main
          done
          echo "failed after 5 retries"; exit 1